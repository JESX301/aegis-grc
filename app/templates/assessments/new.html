{% extends "base.html" %}
{% block title %}New assessment &middot; {{ app_name }}{% endblock %}
{% block content %}
<div class="pagehead"><h1>New assessment</h1><a class="btn ghost" href="/assessments">Cancel</a></div>
<form method="post" action="/assessments" class="card form">
  <label>Title<input name="title" required placeholder="e.g. Customer Portal — Initial Authorization"></label>
  <label>Workflow track
    <select name="template_id" required>
      {% for t in templates %}<option value="{{ t.id }}">{{ t.name }}{% if t.uses_controls %} (control-based){% endif %}</option>{% endfor %}
    </select>
  </label>
  <label>Entity
    <select name="entity_id"><option value="">— (none)</option>
      {% for e in entities %}<option value="{{ e.id }}">{{ e.name }}</option>{% endfor %}
    </select>
  </label>
  <label>Control catalog <span class="muted">(used for control-based tracks; seeds control results)</span>
    <select name="catalog_id"><option value="">— (none)</option>
      {% for c in catalogs %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
    </select>
  </label>
  <button class="btn primary" type="submit">Create assessment</button>
</form>
{% endblock %}
